# GitHub Action: Rags Analytics Stats Proxy
#
# PURPOSE: Fetches cat behavior stats from Cloudflare Worker and saves to GitHub Pages
# This creates a trusted URL (github.io) that VRChat can access without allowlist approval
#
# SETUP:
# 1. Copy this file to your basement-os-web repo at: .github/workflows/rags-stats-proxy.yml
# 2. Create the data directory if it doesn't exist
# 3. Commit and push
# 4. The action runs every 5 minutes and on manual trigger
#
# OUTPUT: https://cloudstrife7.github.io/basement-os-web/data/rags-stats.json

name: Rags Stats Proxy

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger
  # Also trigger after other workflows to keep repo active
  workflow_run:
    workflows: ["Deploy to GitHub Pages", "Update Weather Data"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Rags stats from Cloudflare Worker
        run: |
          mkdir -p public/data
          curl -s "https://rags-analytics.cloudflare-landscape202.workers.dev/rags/stats" > /tmp/rags-stats.json

          # Validate JSON and check for error response
          if jq empty /tmp/rags-stats.json 2>/dev/null; then
            # Check if response is an error
            if jq -e '.error' /tmp/rags-stats.json >/dev/null 2>&1; then
              echo "API returned error response, keeping previous version"
              cat /tmp/rags-stats.json
            elif jq -e '.session_count' /tmp/rags-stats.json >/dev/null 2>&1; then
              echo "Valid stats received"
              cp /tmp/rags-stats.json public/data/rags-stats.json
              cat public/data/rags-stats.json
            else
              echo "Response missing expected fields, keeping previous version"
              cat /tmp/rags-stats.json
            fi
          else
            echo "Invalid JSON, keeping previous version"
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/rags-stats.json
          git diff --staged --quiet || git commit -m "Update Rags stats [automated]"
          git push
